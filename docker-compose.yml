services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: railpass_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-railpass}
      POSTGRES_USER: ${POSTGRES_USER:-railpass_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-railpass_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - railpass_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-railpass_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: railpass_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - railpass_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (FastAPI) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railpass_backend
    ports:
    - "8000:8000"
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./python/srtgo:/app/srtgo
    networks:
      - railpass_net
    command: >
      sh -c "python -m app.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  # ─── Worker (Python 예매 워커) ─────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railpass_worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./python/srtgo:/app/srtgo
    networks:
      - railpass_net
    command: python -m app.workers.main

  # ─── Frontend (Next.js) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    container_name: railpass_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - railpass_net

  # ─── Nginx (리버스 프록시) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: railpass_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - railpass_net

networks:
  railpass_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
